<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MMS News | بوابة الأخبار الذكية</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root {
            --primary: #c41e3a; --primary-dark: #9a1830; --secondary: #1a1a2e;
            --bg: #f8f9fa; --card-bg: #ffffff; --text: #1a1a2e;
            --text-secondary: #6c757d; --border: #e9ecef; --shadow: 0 4px 20px rgba(0,0,0,0.08);
            --transition: all 0.3s ease;
        }

        [data-theme="dark"] {
            --bg: #0f0f1a; --card-bg: #1a1a2e; --text: #e8e8f0;
            --text-secondary: #a0a0b8; --border: #2a2a3e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Tajawal', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; transition: var(--transition); overflow-x: hidden; }

        /* Weather & Top Bar */
        .top-bar { background: var(--secondary); color: white; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; font-size: 0.85rem; flex-wrap: wrap; gap: 10px; }
        .weather-select { background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 4px 10px; border-radius: 8px; cursor: pointer; outline: none; }
        .weather-select option { color: #000; }

        /* Header */
        .main-header { background: var(--card-bg); box-shadow: var(--shadow); position: sticky; top: 0; z-index: 1000; }
        .header-content { max-width: 1400px; margin: 0 auto; padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; }
        .logo { display: flex; align-items: center; gap: 12px; text-decoration: none; }
        .logo-box { background: var(--primary); color: white; width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; border-radius: 12px; font-weight: 900; font-size: 1.3rem; transform: rotate(-5deg); box-shadow: 0 4px 10px rgba(196, 30, 58, 0.3); }
        .logo-name { font-size: 2.1rem; font-weight: 900; color: var(--primary); letter-spacing: -1px; }

        /* Sections */
        .container { max-width: 1400px; margin: 40px auto; padding: 0 25px; }
        .section-header { display: flex; align-items: center; gap: 15px; margin-bottom: 30px; border-bottom: 2px solid var(--border); padding-bottom: 15px; }
        .section-header h2 { font-size: 1.6rem; font-weight: 800; color: var(--text); }
        .section-header i { color: var(--primary); }

        .news-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 30px; margin-bottom: 50px; }
        .news-card { background: var(--card-bg); border-radius: 20px; overflow: hidden; box-shadow: var(--shadow); cursor: pointer; transition: var(--transition); border: 1px solid var(--border); position: relative; }
        .news-card:hover { transform: translateY(-8px); }
        .card-img-wrap { height: 210px; overflow: hidden; }
        .card-img { width: 100%; height: 100%; object-fit: cover; }
        .card-tag { position: absolute; top: 15px; right: 15px; background: var(--primary); color: white; padding: 5px 15px; border-radius: 50px; font-size: 0.75rem; font-weight: 800; }
        .card-body { padding: 25px; }
        .card-meta { display: flex; justify-content: space-between; font-size: 0.85rem; color: var(--text-secondary); margin-top: 15px; border-top: 1px solid var(--border); padding-top: 15px; }

        /* Modal */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2000; backdrop-filter: blur(5px); }
        .progress-container { position: sticky; top: 0; width: 100%; height: 6px; background: rgba(255,255,255,0.1); z-index: 2200; }
        #progressBar { height: 100%; background: var(--primary); width: 0%; transition: width 0.1s; }
        .modal-content { max-width: 850px; margin: 30px auto; background: var(--card-bg); border-radius: 25px; max-height: 90vh; overflow-y: auto; position: relative; }
        .modal-body { padding: 40px; }
        .close-btn { position: fixed; top: 20px; left: 20px; width: 40px; height: 40px; background: var(--primary); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; border: none; z-index: 2300; }
    </style>
</head>
<body data-theme="light">

<div class="top-bar">
    <div id="weatherDisplay"><i class="fas fa-spinner fa-spin"></i> جاري جلب الطقس المباشر...</div>
    <div>
        <select class="weather-select" id="govSelect" onchange="fetchLiveWeather()">
            <option value="30.04,31.23">القاهرة</option>
            <option value="30.01,31.21">الجيزة</option>
            <option value="31.20,29.91">الإسكندرية</option>
            <option value="24.08,32.89">أسوان</option>
            <option value="27.18,31.18">أسيوط</option>
            <option value="31.25,32.28">بورسعيد</option>
        </select>
        <span id="liveDate" style="margin-right: 15px; font-weight: bold;"></span>
    </div>
</div>

<header class="main-header">
    <div class="header-content">
        <a href="#" class="logo">
            <div class="logo-box">MMS</div>
            <span class="logo-name">News</span>
        </a>
        <button onclick="toggleTheme()" style="background:none; border:none; cursor:pointer; font-size:1.3rem; color:var(--text);"><i class="fas fa-adjust"></i></button>
    </div>
</header>

<main class="container">
    <section>
        <div class="section-header"><i class="fas fa-user-md"></i><h2>النبض الطبي</h2></div>
        <div class="news-grid" id="medicalGrid"></div>
    </section>

    <section>
        <div class="section-header"><i class="fas fa-bolt"></i><h2>آخر المستجدات</h2></div>
        <div class="news-grid" id="breakingGrid"></div>
    </section>
</main>

<div id="articleModal" class="modal">
    <button class="close-btn" onclick="closeModal()">&times;</button>
    <div class="modal-content">
        <div class="progress-container"><div id="progressBar"></div></div>
        <div id="modalBody" class="modal-body"></div>
    </div>
</div>

<script>
    // 1. تحديث التاريخ تلقائياً
    function updateLiveDate() {
        const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        document.getElementById('liveDate').innerText = new Date().toLocaleDateString('ar-EG', options);
    }

    // 2. جلب الطقس الحي (مربوط بالأقمار الصناعية)
    async function fetchLiveWeather() {
        const coords = document.getElementById('govSelect').value.split(',');
        const url = `https://api.open-meteo.com/v1/forecast?latitude=${coords[0]}&longitude=${coords[1]}&current_weather=true`;
        
        try {
            const response = await fetch(url);
            const data = await response.json();
            const temp = Math.round(data.current_weather.temperature);
            document.getElementById('weatherDisplay').innerHTML = `<i class="fas fa-thermometer-half"></i> درجة الحرارة الآن: ${temp}°م`;
        } catch (e) {
            document.getElementById('weatherDisplay').innerText = "تعذر جلب الطقس";
        }
    }

    // 3. نظام الأخبار الذكي
    let newsList = [];
    async function fetchNews() {
        const RSS_API = 'https://api.rss2json.com/v1/api.json?rss_url=https://feeds.bbci.co.uk/arabic/rss.xml';
        try {
            const res = await fetch(RSS_API);
            const data = await res.json();
            newsList = data.items.map(item => ({
                id: Math.random().toString(36).substr(2, 9),
                title: item.title,
                desc: item.description,
                date: new Date(item.pubDate),
                img: item.enclosure.link || 'https://images.unsplash.com/photo-1504711434969-e33886168f5c?w=800',
                cat: detectCat(item.title + item.description)
            })).sort((a,b) => b.date - a.date);
            render();
        } catch (e) { console.error("News Error"); }
    }

    function detectCat(t) {
        if (/طب|صحة|علاج|مستشفى|جراحة|تمريض/.test(t)) return 'med';
        return 'news';
    }

    function formatTime(d) {
        const diff = Math.floor((new Date() - d) / 1000 / 3600);
        return diff < 1 ? "الآن" : diff < 24 ? `منذ ${diff} ساعة` : "أمس";
    }

    function render() {
        const medGrid = document.getElementById('medicalGrid');
        const newsGrid = document.getElementById('breakingGrid');
        
        const meds = newsList.filter(n => n.cat === 'med').slice(0, 3);
        const news = newsList.filter(n => n.cat === 'news').slice(0, 6);

        medGrid.innerHTML = meds.map(n => createCard(n)).join('');
        newsGrid.innerHTML = news.map(n => createCard(n)).join('');
    }

    function createCard(n) {
        return `
            <div class="news-card" onclick="openModal('${n.id}')">
                <span class="card-tag">${n.cat === 'med' ? 'طبي' : 'عاجل'}</span>
                <div class="card-img-wrap"><img src="${n.img}" class="card-img"></div>
                <div class="card-body">
                    <h3>${n.title}</h3>
                    <div class="card-meta"><span><i class="far fa-clock"></i> ${formatTime(n.date)}</span></div>
                </div>
            </div>
        `;
    }

    function openModal(id) {
        const n = newsList.find(x => x.id === id);
        const modal = document.getElementById('articleModal');
        document.getElementById('modalBody').innerHTML = `
            <img src="${n.img}" style="width:100%; border-radius:20px; margin-bottom:20px;">
            <h1>${n.title}</h1>
            <p style="margin:20px 0; color:var(--text-secondary); font-size:1.2rem;">${n.desc}</p>
            <p>نُشر بواسطة: MMS News</p>
        `;
        modal.style.display = "block";
        document.body.style.overflow = "hidden";
        
        const contentEl = document.querySelector('.modal-content');
        contentEl.onscroll = () => {
            let scrolled = (contentEl.scrollTop / (contentEl.scrollHeight - contentEl.clientHeight)) * 100;
            document.getElementById("progressBar").style.width = scrolled + "%";
        };
    }

    function closeModal() {
        document.getElementById('articleModal').style.display = "none";
        document.body.style.overflow = "auto";
    }

    function toggleTheme() {
        const b = document.body;
        b.setAttribute('data-theme', b.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
    }

    // تشغيل كل شيء
    updateLiveDate();
    fetchLiveWeather();
    fetchNews();
</script>

</body>
</html>
